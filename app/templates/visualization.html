{% extends "base.html" %}

{% block title %}高级可视化功能{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">高级可视化功能</h1>
    
    <div class="row">
        <!-- 风场粒子流动图 -->
        <div class="col-md-12 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">风场粒子流动图</h5>
                </div>
                <div class="card-body">
                    <div id="wind-field" style="width: 100%; height: 400px;"></div>
                </div>
            </div>
        </div>
        
        <!-- 等压线动态演变 -->
        <div class="col-md-12 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">等压线动态演变</h5>
                </div>
                <div class="card-body">
                    <div id="isobars" style="width: 100%; height: 400px;"></div>
                </div>
            </div>
        </div>
        
        <!-- 卫星云图动画回放 -->
        <div class="col-md-12 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">卫星云图动画回放</h5>
                </div>
                <div class="card-body">
                    <div id="satellite-animation" style="width: 100%; height: 400px;"></div>
                    <div class="mt-3">
                        <button id="play-btn" class="btn btn-primary">播放</button>
                        <button id="pause-btn" class="btn btn-secondary">暂停</button>
                        <button id="stop-btn" class="btn btn-danger">停止</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 玫瑰图（风向频率） -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">玫瑰图（风向频率）</h5>
                </div>
                <div class="card-body">
                    <div id="wind-rose" style="width: 100%; height: 300px;"></div>
                </div>
            </div>
        </div>
        
        <!-- 过程累积雨量柱状对比图 -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">过程累积雨量柱状对比图</h5>
                </div>
                <div class="card-body">
                    <div id="rainfall-bar" style="width: 100%; height: 300px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 风场粒子流动图
        const windFieldChart = echarts.init(document.getElementById('wind-field'));
        
        fetch('/visualization/wind-field')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    const windData = data.wind_data;
                    
                    const option = {
                        title: {
                            text: '全国风场分布',
                            left: 'center'
                        },
                        tooltip: {
                            trigger: 'item',
                            formatter: function(params) {
                                return `风速: ${params.value[2].toFixed(1)} m/s<br/>风向: ${params.value[3].toFixed(0)}°`;
                            }
                        },
                        geo: {
                            map: 'china',
                            roam: true,
                            label: {
                                show: true,
                                fontSize: 10
                            }
                        },
                        series: [{
                            name: '风场',
                            type: 'effectScatter',
                            coordinateSystem: 'geo',
                            data: windData.map(item => ({
                                value: [item[0], item[1], item[2], item[3]],
                                symbolSize: item[2] * 2
                            })),
                            effect: {
                                show: true,
                                period: 2,
                                trailLength: 0.3,
                                color: '#fff',
                                symbolSize: 3
                            },
                            label: {
                                show: false
                            }
                        }]
                    };
                    
                    windFieldChart.setOption(option);
                }
            });
        
        // 等压线动态演变
        const isobarsChart = echarts.init(document.getElementById('isobars'));
        
        fetch('/visualization/isobars')
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    const isobars = data.isobars;
                    
                    const series = isobars.map(isobar => ({
                        name: `${isobar.pressure} hPa`,
                        type: 'line',
                        coordinateSystem: 'geo',
                        data: isobar.points,
                        lineStyle: {
                            color: '#1890ff',
                            width: 2
                        },
                        label: {
                            show: true,
                            position: 'middle',
                            formatter: `${isobar.pressure}`
                        }
                    }));
                    
                    const option = {
                        title: {
                            text: '等压线分布',
                            left: 'center'
                        },
                        geo: {
                            map: 'china',
                            roam: true,
                            label: {
                                show: true,
                                fontSize: 10
                            }
                        },
                        series: series
                    };
                    
                    isobarsChart.setOption(option);
                }
            });
        
        // 卫星云图动画回放
        const satelliteChart = echarts.init(document.getElementById('satellite-animation'));
        
        // 模拟卫星云图数据
        const satelliteImages = [
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=satellite%20cloud%20image%20of%20china%201&image_size=landscape_16_9",
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=satellite%20cloud%20image%20of%20china%202&image_size=landscape_16_9",
            "https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=satellite%20cloud%20image%20of%20china%203&image_size=landscape_16_9"
        ];
        
        let currentImageIndex = 0;
        let animationInterval;
        
        function updateSatelliteImage() {
            const option = {
                title: {
                    text: '卫星云图动画',
                    left: 'center'
                },
                graphic: [{
                    type: 'image',
                    left: 'center',
                    top: 'center',
                    z: 1,
                    bounding: 'raw',
                    style: {
                        image: satelliteImages[currentImageIndex],
                        width: '100%',
                        height: '100%'
                    }
                }]
            };
            
            satelliteChart.setOption(option);
            currentImageIndex = (currentImageIndex + 1) % satelliteImages.length;
        }
        
        document.getElementById('play-btn').addEventListener('click', function() {
            if (!animationInterval) {
                animationInterval = setInterval(updateSatelliteImage, 2000);
            }
        });
        
        document.getElementById('pause-btn').addEventListener('click', function() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
        });
        
        document.getElementById('stop-btn').addEventListener('click', function() {
            if (animationInterval) {
                clearInterval(animationInterval);
                animationInterval = null;
            }
            currentImageIndex = 0;
            updateSatelliteImage();
        });
        
        // 初始化卫星云图
        updateSatelliteImage();
        
        // 玫瑰图（风向频率）
        const windRoseChart = echarts.init(document.getElementById('wind-rose'));
        
        const windRoseOption = {
            title: {
                text: '风向频率玫瑰图',
                left: 'center'
            },
            polar: {
                radius: '70%'
            },
            angleAxis: {
                type: 'category',
                data: ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'],
                boundaryGap: false,
                splitNumber: 8,
                axisLine: {
                    show: true
                },
                axisTick: {
                    show: true
                },
                axisLabel: {
                    show: true,
                    fontSize: 12
                },
                splitLine: {
                    show: true,
                    lineStyle: {
                        color: '#e6e6e6'
                    }
                }
            },
            radiusAxis: {
                type: 'value',
                axisLine: {
                    show: false
                },
                axisTick: {
                    show: false
                },
                axisLabel: {
                    show: true,
                    formatter: '{value}%'
                },
                splitLine: {
                    show: true,
                    lineStyle: {
                        color: '#e6e6e6'
                    }
                }
            },
            series: [{
                name: '风向频率',
                type: 'bar',
                data: [10, 8, 12, 15, 18, 12, 9, 7, 8, 10, 14, 16, 12, 9, 11, 9],
                coordinateSystem: 'polar',
                itemStyle: {
                    color: '#1890ff'
                }
            }]
        };
        
        windRoseChart.setOption(windRoseOption);
        
        // 过程累积雨量柱状对比图
        const rainfallBarChart = echarts.init(document.getElementById('rainfall-bar'));
        
        const rainfallBarOption = {
            title: {
                text: '过程累积雨量对比',
                left: 'center'
            },
            tooltip: {
                trigger: 'axis',
                axisPointer: {
                    type: 'shadow'
                }
            },
            legend: {
                data: ['2023年', '2024年'],
                bottom: 0
            },
            xAxis: {
                type: 'category',
                data: ['北京', '上海', '广州', '成都', '武汉']
            },
            yAxis: {
                type: 'value',
                name: '累积雨量 (mm)'
            },
            series: [
                {
                    name: '2023年',
                    type: 'bar',
                    data: [120, 150, 200, 180, 160]
                },
                {
                    name: '2024年',
                    type: 'bar',
                    data: [130, 160, 210, 170, 180]
                }
            ]
        };
        
        rainfallBarChart.setOption(rainfallBarOption);
        
        // 响应式处理
        window.addEventListener('resize', function() {
            windFieldChart.resize();
            isobarsChart.resize();
            satelliteChart.resize();
            windRoseChart.resize();
            rainfallBarChart.resize();
        });
    });
</script>
{% endblock %}
