{% extends "base.html" %}

{% block title %}气象计算功能{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4">气象计算功能</h1>
    
    <div class="row">
        <!-- 积温计算 -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">积温计算 (GDD)</h5>
                </div>
                <div class="card-body">
                    <form id="gdd-form">
                        <div class="form-group">
                            <label for="gdd-city">城市</label>
                            <input type="text" class="form-control" id="gdd-city" name="city" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="gdd-start-date">开始日期</label>
                                <input type="date" class="form-control" id="gdd-start-date" name="start_date" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="gdd-end-date">结束日期</label>
                                <input type="date" class="form-control" id="gdd-end-date" name="end_date" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="gdd-base-temp">基础温度 (°C)</label>
                            <input type="number" step="0.1" class="form-control" id="gdd-base-temp" name="base_temperature" value="10" required>
                        </div>
                        <button type="submit" class="btn btn-primary">计算积温</button>
                    </form>
                    <div id="gdd-result" class="mt-3"></div>
                </div>
            </div>
        </div>
        
        <!-- 有效降水量计算 -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">有效降水量计算</h5>
                </div>
                <div class="card-body">
                    <form id="precip-form">
                        <div class="form-group">
                            <label for="precip-city">城市</label>
                            <input type="text" class="form-control" id="precip-city" name="city" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label for="precip-start-date">开始日期</label>
                                <input type="date" class="form-control" id="precip-start-date" name="start_date" required>
                            </div>
                            <div class="form-group col-md-6">
                                <label for="precip-end-date">结束日期</label>
                                <input type="date" class="form-control" id="precip-end-date" name="end_date" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">计算有效降水量</button>
                    </form>
                    <div id="precip-result" class="mt-3"></div>
                </div>
            </div>
        </div>
        
        <!-- 连续无雨日数计算 -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">连续无雨日数计算</h5>
                </div>
                <div class="card-body">
                    <form id="dry-days-form">
                        <div class="form-group">
                            <label for="dry-days-city">城市</label>
                            <input type="text" class="form-control" id="dry-days-city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="dry-days-end-date">结束日期</label>
                            <input type="date" class="form-control" id="dry-days-end-date" name="end_date" required>
                        </div>
                        <button type="submit" class="btn btn-primary">计算连续无雨日数</button>
                    </form>
                    <div id="dry-days-result" class="mt-3"></div>
                </div>
            </div>
        </div>
        
        <!-- 极端天气重现期计算 -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title">极端天气重现期计算</h5>
                </div>
                <div class="card-body">
                    <form id="recurrence-form">
                        <div class="form-group">
                            <label for="recurrence-city">城市</label>
                            <input type="text" class="form-control" id="recurrence-city" name="city" required>
                        </div>
                        <div class="form-group">
                            <label for="event-type">事件类型</label>
                            <select class="form-control" id="event-type" name="event_type" required>
                                <option value="暴雨">暴雨</option>
                                <option value="大风">大风</option>
                                <option value="高温">高温</option>
                                <option value="低温">低温</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="intensity">事件强度</label>
                            <input type="number" step="0.1" class="form-control" id="intensity" name="intensity" required>
                            <small class="form-text text-muted">暴雨：小时雨强(mm)，大风：风速(m/s)，高温/低温：温度(°C)</small>
                        </div>
                        <button type="submit" class="btn btn-primary">计算重现期</button>
                    </form>
                    <div id="recurrence-result" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 积温计算
        document.getElementById('gdd-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/weather-calculations/gdd', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('gdd-result').innerHTML = 
                        `<div class="alert alert-success">积温计算结果：${data.gdd} °C·天</div>`;
                } else {
                    document.getElementById('gdd-result').innerHTML = 
                        `<div class="alert alert-danger">计算失败：${data.message}</div>`;
                }
            });
        });
        
        // 有效降水量计算
        document.getElementById('precip-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/weather-calculations/effective-precipitation', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('precip-result').innerHTML = 
                        `<div class="alert alert-success">有效降水量计算结果：${data.effective_precipitation} mm</div>`;
                } else {
                    document.getElementById('precip-result').innerHTML = 
                        `<div class="alert alert-danger">计算失败：${data.message}</div>`;
                }
            });
        });
        
        // 连续无雨日数计算
        document.getElementById('dry-days-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/weather-calculations/dry-days', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('dry-days-result').innerHTML = 
                        `<div class="alert alert-success">连续无雨日数：${data.dry_days} 天</div>`;
                } else {
                    document.getElementById('dry-days-result').innerHTML = 
                        `<div class="alert alert-danger">计算失败：${data.message}</div>`;
                }
            });
        });
        
        // 极端天气重现期计算
        document.getElementById('recurrence-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('/weather-calculations/recurrence', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    document.getElementById('recurrence-result').innerHTML = 
                        `<div class="alert alert-success">重现期计算结果：${data.recurrence_period} 年</div>`;
                } else {
                    document.getElementById('recurrence-result').innerHTML = 
                        `<div class="alert alert-danger">计算失败：${data.message}</div>`;
                }
            });
        });
    });
</script>
{% endblock %}
